name: 주제별 수집 테스트

on:
  push:
    branches: ["claude/police-news-webapp-frm12p"]
    paths: ["scraper/**", ".github/workflows/test-topics.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 전체 수집 실행 (커밋 없음)
        run: python scraper/scrape.py
      - name: 결과 요약
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          base = Path("docs/data")
          assert not list(base.glob("????-??-??.json")), "레거시 파일이 남아있음"
          for topic in ("police", "realestate", "stock"):
              files = sorted((base / topic).glob("????-??-??.json"))
              assert files, f"{topic} 데이터 없음"
              d = json.loads(files[-1].read_text())
              google = sum(1 for a in d["raw"] if "news.google.com" in a["link"])
              print(f"{topic}: 기사 {d['total_articles']}건, 이슈 {d['total_issues']}개, "
                    f"주요 {len(d['top_issues'])}개, 미변환 링크 {google}건")
              assert d["total_articles"] > 0
          print("✅ 3개 주제 모두 정상")
          EOF
