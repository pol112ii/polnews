name: 요약·확장검색 테스트

on:
  push:
    branches: ["claude/police-news-webapp-frm12p"]
    paths: ["scraper/**", ".github/workflows/test-summary.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 정시 수집 실행 (커밋 없음)
        run: python scraper/scrape.py
      - name: 속보 수집 실행 (커밋 없음)
        run: python scraper/scrape.py breaking
      - name: 결과 검증
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          # 경찰: 확장 검색어 반영 + 요약 부착률
          files = sorted(Path("docs/data/police").glob("????-??-??.json"))
          d = json.loads(files[-1].read_text())
          shown = d["top_issues"] + [a for s in d["sections"] for a in s["articles"]]
          with_sum = [a for a in shown if a.get("summary")]
          print(f"경찰: 기사 {d['total_articles']}건 / 표시 이슈 {len(shown)}개 / 요약 {len(with_sum)}개")
          print("섹션:", [s['name'] for s in d['sections']])
          for a in with_sum[:3]:
              print(f"  · {a['title'][:30]}")
              print(f"    └ {a['summary'][:70]}")
          # 속보 요약
          b = json.loads(Path("docs/data/breaking.json").read_text())
          bsum = [a for a in b["items"] if a.get("summary")]
          print(f"속보: {len(b['items'])}건 / 요약 {len(bsum)}개")
          assert len(with_sum) >= 10, f"경찰 요약 부착 {len(with_sum)}개 — 너무 적음"
          assert len(bsum) >= 5, f"속보 요약 부착 {len(bsum)}개 — 너무 적음"
          EOF
