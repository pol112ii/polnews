name: 링크 매핑 수정 검증

on:
  push:
    branches: ["claude/police-news-webapp-frm12p"]
    paths: ["scraper/**", ".github/workflows/test-resolve-fix.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 전체 수집 실행 (커밋 없음)
        run: python scraper/scrape.py
      - name: 제목↔링크 일치 검증
        run: |
          python - <<'EOF'
          import json, urllib.parse
          from pathlib import Path
          d = json.loads(Path("docs/data/police/2026-07-03.json").read_text())
          known = {
            '조선일보':'chosun','중앙일보':'joongang','동아일보':'donga','한겨레':'hani',
            '경향신문':'khan','연합뉴스':'yna','뉴시스':'newsis','뉴스1':'news1',
            'KBS':'kbs','YTN':'ytn','머니투데이':'mt.co.kr','한국경제':'hankyung',
            '매일경제':'mk.co.kr','서울신문':'seoul','국민일보':'kmib',
            '세계일보':'segye','문화일보':'munhwa','이데일리':'edaily',
          }
          def dom(u): return urllib.parse.urlparse(u).netloc.lower()
          resolved = [a for a in d["raw"]
                      if "news.google.com" not in a["link"] and a["link"].startswith("http")]
          checked = mism = 0
          examples = []
          for a in resolved:
              key = known.get(a.get("source",""))
              if not key: continue
              checked += 1
              if key not in dom(a["link"]):
                  mism += 1
                  if len(examples) < 8:
                      examples.append(f"[{a['source']}] {a['title'][:25]} -> {dom(a['link'])}")
          rate = mism / checked * 100 if checked else 0
          print(f"변환 {len(resolved)}건 / 대조 {checked}건 / 불일치 {mism}건 ({rate:.1f}%)")
          for e in examples: print("  불일치:", e)
          # 수정 전 47% -> 수정 후 5% 미만이어야 정상 (아주 드물게 재배포/우연 오차 허용)
          assert checked >= 30, "대조 표본 부족"
          assert rate < 5, f"불일치율 {rate:.1f}% — 여전히 링크가 어긋남"
          print("✅ 제목↔링크 매핑 정상")
          EOF
