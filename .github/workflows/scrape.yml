name: 뉴스 스크랩

on:
  schedule:
    # 매시간, UTC 20~23시 + 0~14시 = 한국시간 05~23시.
    # 정각은 GitHub 예약이 몰려 잘 건너뛰므로 7분으로 분산.
    - cron: "7 0-14,20-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # 속보 수집 깨우기용
  pages: write     # Pages 빌드 강제 요청용

# 이전 실행이 끝나기 전에 다음 실행이 겹치지 않도록 직렬화
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 주제 3개 × 첫 실행 링크 변환까지 고려한 여유 시간
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 뉴스 수집
        run: python scraper/scrape.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
            exit 0
          fi
          git commit -m "뉴스 스크랩: $(TZ=Asia/Seoul date '+%F %H:%M')"
          # 다른 커밋이 먼저 들어왔을 수 있으니 리베이스 후 푸시
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      # ── 자가 복구 장치 (배포 호출 + 속보 상호 감시) ───────────────
      - name: 자가 복구 (사이트 배포 호출 + 속보 수집 깨우기)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1) 배포 워크플로를 직접 호출한다.
          #    GITHUB_TOKEN 커밋은 push 트리거를 깨우지 않으므로,
          #    수집 후 배포를 반드시 우리가 명시적으로 실행해준다.
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}' -o /dev/null -w "배포 호출: %{http_code}\n"

          # 2) 속보 수집이 70분 넘게 안 돌았으면 깨우기 (24시간 대상)
          age=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/breaking.yml/runs?per_page=1" \
            | python3 -c "
          import json,sys
          from datetime import datetime,timezone
          try:
              r=json.load(sys.stdin)['workflow_runs'][0]
              print(int((datetime.now(timezone.utc)-datetime.fromisoformat(
                  r['created_at'].replace('Z','+00:00'))).total_seconds()))
          except Exception:
              print(999999)
          ")
          echo "속보 수집 마지막 실행: ${age}초 전"
          if [ "$age" -gt 4200 ]; then
            echo "속보 수집이 밀림 → 깨우기"
            curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/breaking.yml/dispatches" \
              -d '{"ref":"main"}' -o /dev/null -w "깨우기 응답: %{http_code}\n"
          fi
