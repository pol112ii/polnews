name: 뉴스 스크랩

on:
  schedule:
    # 매시간 정각, UTC 20~23시 + 0~14시 = 한국시간 05:00~23:00
    # (GitHub Actions 특성상 실제 실행은 수 분~수십 분 늦어질 수 있음)
    - cron: "0 0-14,20-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# 이전 실행이 끝나기 전에 다음 실행이 겹치지 않도록 직렬화
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 뉴스 수집
        run: python scraper/scrape.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
            exit 0
          fi
          git commit -m "뉴스 스크랩: $(TZ=Asia/Seoul date '+%F %H:%M')"
          # 다른 커밋이 먼저 들어왔을 수 있으니 리베이스 후 푸시
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
