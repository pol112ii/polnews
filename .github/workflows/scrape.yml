name: 아침 뉴스 스크랩

on:
  schedule:
    # 매일 20:00 UTC = 한국시간 새벽 05:00
    # (GitHub Actions 특성상 실제 실행은 수 분~수십 분 늦어질 수 있음)
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 뉴스 수집
        run: python scraper/scrape.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "뉴스 스크랩: $(TZ=Asia/Seoul date +%F)"
            git push
          fi
