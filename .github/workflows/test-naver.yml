name: 네이버 수집 테스트

on:
  push:
    branches: ["claude/police-news-webapp-frm12p"]
    paths: ["scraper/**", ".github/workflows/test-naver.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 네이버 키 확인 + 수집 검증
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, "scraper")
          import scrape

          print("네이버 키 설정됨?:", scrape.naver_enabled())
          assert scrape.naver_enabled(), "Secrets에 NAVER_CLIENT_ID/SECRET 없음"

          arts = scrape.fetch_articles_naver(["경찰", "부동산", "코스피"])
          print(f"네이버 수집: {len(arts)}건")
          assert len(arts) > 0, "네이버 수집 0건 (키·권한 확인 필요)"

          naver_links = sum(1 for a in arts if "naver.com" in a["link"])
          with_sum = sum(1 for a in arts if a.get("summary"))
          sources = {a["source"] for a in arts if a["source"]}
          print(f"네이버 링크 {naver_links}건 / 요약 {with_sum}건 / 언론사 {len(sources)}곳")
          print("샘플:")
          for a in arts[:5]:
              print(f"  · [{a['source']}] {a['title'][:34]}")
              if a.get('summary'):
                  print(f"      요약: {a['summary'][:56]}")
              print(f"      링크: {a['link'][:60]}")
          assert with_sum >= len(arts) // 2, "요약 부착률이 너무 낮음"
          # 디스패처가 국내에서 네이버를 실제로 쓰는지
          # (네이버 경로만 summary를 채우므로, 요약 존재 = 네이버 사용 증거)
          d = scrape.fetch_articles(["경찰"])
          assert d, "디스패처 수집 0건"
          assert any(a.get("summary") for a in d), "디스패처가 네이버를 쓰지 않음"
          naver_ratio = sum(1 for a in d if "naver.com" in a["link"]) / len(d)
          print(f"디스패처 네이버 링크 비율: {naver_ratio:.0%}")
          print("\n✅ 네이버 전환 정상 동작")
          EOF
