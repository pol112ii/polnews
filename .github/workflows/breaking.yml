name: 속보 스크랩

on:
  schedule:
    # 30분마다, 24시간. 정각·30분 정각은 GitHub 예약이 몰려 잘 건너뛰므로
    # 한산한 13분·43분으로 분산해 건너뜀 확률을 낮춘다.
    - cron: "13,43 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # 정시 수집 깨우기용
  pages: write     # Pages 빌드 강제 요청용

# 정시 뉴스 스크랩과 같은 그룹으로 묶어 커밋 경합을 방지
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 속보 수집
        run: python scraper/scrape.py breaking

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
            exit 0
          fi
          git commit -m "속보: $(TZ=Asia/Seoul date '+%F %H:%M')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      # ── 자가 복구 장치 (배포 호출 + 정시 상호 감시) ───────────────
      - name: 자가 복구 (사이트 배포 호출 + 정시 수집 깨우기)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1) 배포 워크플로를 직접 호출 (GITHUB_TOKEN 커밋은 push를 안 깨움)
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}' -o /dev/null -w "배포 호출: %{http_code}\n"

          # 2) 정시 수집이 오래 안 돌았으면 깨우기
          age=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/scrape.yml/runs?per_page=1" \
            | python3 -c "
          import json,sys
          from datetime import datetime,timezone
          try:
              r=json.load(sys.stdin)['workflow_runs'][0]
              print(int((datetime.now(timezone.utc)-datetime.fromisoformat(
                  r['created_at'].replace('Z','+00:00'))).total_seconds()))
          except Exception:
              print(999999)
          ")
          hour_kst=$((10#$(TZ=Asia/Seoul date +%H)))
          echo "정시 수집 마지막 실행: ${age}초 전 (현재 KST ${hour_kst}시)"
          if [ "$age" -gt 6000 ] && [ "$hour_kst" -ge 5 ]; then
            echo "정시 수집이 밀림 → 깨우기"
            curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/scrape.yml/dispatches" \
              -d '{"ref":"main"}' -o /dev/null -w "깨우기 응답: %{http_code}\n"
          fi
