name: 속보 수집 테스트

on:
  push:
    branches: ["claude/police-news-webapp-frm12p"]
    paths: ["scraper/**", ".github/workflows/test-breaking.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 속보 수집 실행 (커밋 없음)
        run: python scraper/scrape.py breaking
      - name: 결과 검증
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          d = json.loads(Path("docs/data/breaking.json").read_text())
          items = d["items"]
          google = sum(1 for a in d["raw"] if "news.google.com" in a["link"])
          markers = sum(1 for a in items
                        if any(m in a["title"] for m in ("속보","단독","긴급")))
          tagged = sum(1 for a in items if a.get("topics"))
          print(f"속보 이슈 {len(items)}개 / 원본 {d['total_articles']}건 / "
                f"미변환 {google}건 / 표기확인 {markers} / 분야태그 {tagged}")
          print("\n최신 5건:")
          for a in items[:5]:
              print(f"  {a['published'][11:16]} [{a['mention_count']}개사] {a['title'][:45]}")
          assert len(items) > 0, "속보 0건"
          assert markers == len(items), "속보 표기 없는 항목 존재"
          assert not d.get("sample"), "샘플이 남아 있음"
          EOF
