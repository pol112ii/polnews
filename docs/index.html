<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데일리 뉴스 브리핑</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a62d6">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="뉴스브리핑">
<style>
  :root {
    --bg: #0e0f12;
    --card: #17181c;
    --text: #e8e9ec;
    --muted: #8b8e96;
    --accent: #4c8dff;
    --hot: #ff6b4a;
    --line: #2a2c33;
    --badge-bg: #2a2c33;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1c1e22;
      --muted: #6b6e76;
      --accent: #1a62d6;
      --hot: #d6431a;
      --line: #e2e4e9;
      --badge-bg: #eef0f4;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", "Malgun Gothic", sans-serif;
    line-height: 1.6;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 20px 16px 60px; }
  header { position: relative; }
  header h1 { font-size: 1.25rem; margin: 0 0 4px; padding-right: 90px; }
  header p { color: var(--muted); font-size: 0.85rem; margin: 0; }
  .counter {
    position: absolute; top: 0; right: 0;
    text-align: right;
    color: var(--muted); font-size: 0.68rem; line-height: 1.5;
    letter-spacing: 0.04em;
  }
  .counter b { color: var(--text); font-weight: 700; }

  .tabs {
    display: flex; gap: 6px;
    margin: 16px 0 0;
  }
  .tabs button {
    flex: 1;
    background: var(--card); color: var(--muted);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 4px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer;
  }
  .tabs button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .tabs button[data-id="breaking"].active {
    background: var(--hot); border-color: var(--hot);
  }

  /* 다른 탭 상단의 속보 배너 */
  .bbanner {
    display: none;
    align-items: center; gap: 8px;
    width: 100%;
    background: color-mix(in srgb, var(--hot) 12%, var(--card));
    color: var(--hot);
    border: 1px solid var(--hot); border-radius: 10px;
    padding: 9px 14px; margin: 10px 0 0;
    font-size: 0.88rem; font-weight: 700;
    cursor: pointer; text-align: left;
  }
  .bbanner.show { display: flex; }

  /* 속보 타임라인 요소들 */
  .live-dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--hot); border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }
  .chip {
    display: inline-block;
    border-radius: 4px; padding: 0 6px; margin-right: 6px;
    font-size: 0.72rem; font-weight: 800; color: #fff;
    vertical-align: 2px;
  }
  .chip.sokbo { background: var(--hot); }
  .chip.dandok { background: var(--accent); }
  .chip.urgent { background: #e6a700; }
  .ticons { font-size: 0.8rem; margin-left: 4px; }

  .region {
    display: none; gap: 6px; margin: 10px 0 0;
  }
  .region.show { display: flex; }
  .region button {
    flex: 1;
    background: var(--card); color: var(--muted);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 4px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer;
  }
  .region button.active {
    color: var(--text); border-color: var(--text);
  }

  .nav {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 0;
  }
  .nav button, .nav select {
    background: var(--card); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 12px; font-size: 0.95rem; cursor: pointer;
  }
  .nav button:disabled { opacity: 0.35; cursor: default; }
  .nav select { flex: 1; }

  .banner {
    background: #5a4a1a; color: #ffe9a8;
    border-radius: 8px; padding: 10px 14px;
    font-size: 0.85rem; margin-bottom: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  .card h2 {
    font-size: 1.05rem; margin: 0;
    padding-bottom: 4px;
  }
  .updated {
    color: var(--muted); font-size: 0.78rem;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--text);
  }
  .weather {
    color: var(--muted); font-size: 0.9rem;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .weather .today { color: var(--text); font-size: 1rem; }

  .section-title {
    font-size: 0.85rem; font-weight: 700;
    color: var(--accent);
    margin: 20px 0 4px;
    letter-spacing: 0.02em;
  }
  .section-title.hot { color: var(--hot); font-size: 0.95rem; }

  ul.articles { list-style: none; margin: 0; padding: 0; }
  ul.articles li {
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  ul.articles li:last-child { border-bottom: none; }
  ul.articles a {
    color: var(--text); text-decoration: none;
    display: block; font-size: 0.97rem;
  }
  ul.articles a:hover { color: var(--accent); }
  .meta {
    color: var(--muted); font-size: 0.78rem; margin-top: 3px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .badge {
    display: inline-block;
    background: var(--badge-bg); color: var(--muted);
    border-radius: 20px; padding: 1px 9px;
    font-size: 0.72rem; font-weight: 600;
  }
  .badge.hot { background: var(--hot); color: #fff; }
  .meta.orig {
    display: block;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-style: italic;
  }
  .summary {
    color: var(--muted); font-size: 0.85rem; line-height: 1.5;
    margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .rank {
    display: inline-block; width: 1.3em;
    color: var(--hot); font-weight: 800;
  }

  .toolbar { display: flex; gap: 8px; margin-top: 16px; }
  .toolbar button {
    flex: 1;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    padding: 12px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer;
  }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  footer { color: var(--muted); font-size: 0.75rem; text-align: center; margin-top: 24px; }
  footer a { color: var(--muted); }
  footer .guide-link {
    display: inline-block; margin-bottom: 8px;
    color: var(--accent); font-size: 0.85rem; font-weight: 600;
    cursor: pointer; text-decoration: none;
  }

  /* 첫 방문 사용법 안내 모달 */
  .modal-back {
    display: none;
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.6);
    align-items: flex-end; justify-content: center;
  }
  .modal-back.show { display: flex; }
  .modal {
    background: var(--card); color: var(--text);
    border: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 640px;
    max-height: 85vh; overflow-y: auto;
    padding: 22px 20px 28px;
  }
  .modal h2 { font-size: 1.1rem; margin: 0 0 4px; }
  .modal .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 14px; }
  .modal h3 {
    font-size: 0.92rem; margin: 18px 0 6px;
    color: var(--accent);
  }
  .modal ul { margin: 0; padding-left: 2px; list-style: none; }
  .modal li {
    font-size: 0.9rem; line-height: 1.65; padding: 3px 0;
  }
  .modal .os {
    border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; margin-top: 8px;
  }
  .modal .os.mine { border-color: var(--accent); }
  .modal .os b.os-title { display: block; margin-bottom: 4px; }
  .modal .os .tag {
    display: inline-block; font-size: 0.7rem; font-weight: 700;
    background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 8px; margin-left: 6px;
    vertical-align: 2px;
  }
  .modal .start {
    width: 100%; margin-top: 18px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    padding: 13px; font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .modal .install-now {
    width: 100%; margin-top: 8px;
    background: var(--card); color: var(--accent);
    border: 1px solid var(--accent); border-radius: 10px;
    padding: 11px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📰 데일리 뉴스 브리핑</h1>
    <p>매일 아침 5시부터 밤 11시까지, 매시간 주제별 기사를 자동 수집합니다</p>
    <div class="counter" id="counter" hidden>
      TODAY <b id="cntToday">-</b><br>TOTAL <b id="cntTotal">-</b>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>

  <button class="bbanner" id="bbanner"></button>

  <div class="region" id="regionBar">
    <button data-region="kr">🇰🇷 국내</button>
    <button data-region="intl">🌍 해외</button>
  </div>

  <div class="nav">
    <button id="prevBtn" aria-label="이전 날짜">◀</button>
    <select id="dateSelect" aria-label="날짜 선택"></select>
    <button id="nextBtn" aria-label="다음 날짜">▶</button>
  </div>

  <div id="content"></div>

  <footer>
    <a class="guide-link" onclick="openGuide()">📖 사용법 · 홈 화면에 앱으로 설치하기</a><br>
    출처: 구글 뉴스 검색 · 날씨: open-meteo ·
    <a href="https://github.com/pol112ii/polnews" target="_blank" rel="noopener">GitHub</a>
  </footer>
</div>

<div class="modal-back" id="guideBack">
  <div class="modal" id="guideModal"></div>
</div>

<script>
const DAY_NAMES = ["일", "월", "화", "수", "목", "금", "토"];
let topics = [];
let currentTopic = null;
let dates = [];
let current = null;
let currentData = null;
let currentRegion = "kr"; // "kr" 국내 | "intl" 해외

function dayLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00+09:00");
  return DAY_NAMES[d.getDay()];
}

function fmtDate(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return `${parseInt(m)}.${parseInt(d)}(${dayLabel(dateStr)})`;
}

function fmtTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString("ko-KR", {
    hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Seoul"
  });
}

async function fetchJson(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`${res.status} ${url}`);
  return res.json();
}

// 탭 도입 전 데이터 경로(data/*.json)도 읽을 수 있게 하는 폴백.
// 경찰 탭 전용이며, 새 구조로 수집이 시작되면 자연히 쓰이지 않는다.
async function fetchTopicIndex(topicId) {
  try {
    return await fetchJson(`data/${topicId}/index.json`);
  } catch (e) {
    if (topicId === "police") return fetchJson("data/index.json");
    throw e;
  }
}

async function fetchBriefing(topicId, date) {
  try {
    return await fetchJson(`data/${topicId}/${date}.json`);
  } catch (e) {
    if (topicId === "police") return fetchJson(`data/${date}.json`);
    throw e;
  }
}

async function init() {
  topics = (await fetchJson("data/topics.json")).topics;
  const saved = localStorage.getItem("topic");
  currentTopic = topics.find(t => t.id === saved) || topics[0];
  renderTabs();
  document.getElementById("prevBtn").onclick = () => move(1);
  document.getElementById("nextBtn").onclick = () => move(-1);
  document.getElementById("dateSelect").onchange =
    e => show(e.target.value);
  document.querySelectorAll("#regionBar button").forEach(btn => {
    btn.onclick = () => {
      currentRegion = btn.dataset.region;
      updateRegionBar();
      if (currentData) render(currentData);
    };
  });
  document.getElementById("bbanner").onclick = async () => {
    currentTopic = topics.find(t => t.id === "breaking") || currentTopic;
    localStorage.setItem("topic", currentTopic.id);
    renderTabs();
    await loadTopic();
  };
  // 속보 탭을 보는 동안 5분마다 조용히 갱신
  setInterval(() => {
    if (currentTopic && currentTopic.id === "breaking") loadBreaking();
  }, 5 * 60 * 1000);
  await loadTopic();
}

function updateRegionBar() {
  const bar = document.getElementById("regionBar");
  const hasIntl = currentData && currentData.intl;
  bar.classList.toggle("show", !!hasIntl);
  if (!hasIntl) currentRegion = "kr";
  bar.querySelectorAll("button").forEach(b =>
    b.classList.toggle("active", b.dataset.region === currentRegion));
}

function renderTabs() {
  const bar = document.getElementById("tabs");
  bar.innerHTML = topics.map(t =>
    `<button data-id="${t.id}" class="${t.id === currentTopic.id ? "active" : ""}">
      ${t.emoji} ${t.label}
    </button>`).join("");
  bar.querySelectorAll("button").forEach(btn => {
    btn.onclick = async () => {
      currentTopic = topics.find(t => t.id === btn.dataset.id);
      currentRegion = "kr";
      localStorage.setItem("topic", currentTopic.id);
      renderTabs();
      await loadTopic();
    };
  });
}

async function loadTopic() {
  const content = document.getElementById("content");
  const isBreaking = currentTopic.id === "breaking";
  document.querySelector(".nav").style.display = isBreaking ? "none" : "flex";
  const bb = document.getElementById("bbanner");
  if (isBreaking) {
    bb.classList.remove("show");
    document.getElementById("regionBar").classList.remove("show");
    await loadBreaking();
    return;
  }
  updateBanner();
  try {
    dates = (await fetchTopicIndex(currentTopic.id)).dates;
  } catch (e) {
    dates = [];
  }
  const sel = document.getElementById("dateSelect");
  sel.innerHTML = dates.map(d =>
    `<option value="${d}">${d} (${dayLabel(d)})</option>`).join("");
  if (dates.length) await show(dates[0]);
  else content.innerHTML =
    `<div class="empty">아직 수집된 데이터가 없습니다.<br>다음 정시 수집을 기다려주세요.</div>`;
}

// ── 속보 타임라인 ──────────────────────────────────────────────
const TOPIC_ICONS = { police: "🚔", realestate: "🏠", stock: "📈" };
let breakingData = null;
let breakingCache = { t: 0, data: null };

function timeAgo(iso) {
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60) return "방금 전";
  if (s < 3600) return `${Math.floor(s / 60)}분 전`;
  if (s < 86400) return `${Math.floor(s / 3600)}시간 전`;
  return `${Math.floor(s / 86400)}일 전`;
}

async function loadBreaking() {
  const content = document.getElementById("content");
  try {
    breakingData = await fetchJson("data/breaking.json");
    breakingCache = { t: Date.now(), data: breakingData };
  } catch (e) {
    content.innerHTML =
      `<div class="empty">아직 속보 데이터가 없습니다.<br>첫 수집(30분 이내)을 기다려주세요.</div>`;
    return;
  }
  renderBreaking(breakingData);
}

function breakingLi(a) {
  const fresh = (Date.now() - new Date(a.published).getTime()) < 60 * 60 * 1000;
  let title = a.title;
  const m = title.match(/^[\[〔【]?(속보|단독|긴급)[\]〕】]?\s*/);
  if (m) title = title.slice(m[0].length);
  const marker = m ? m[1]
    : (["단독", "긴급"].find(k => a.title.includes(k)) || "속보");
  const cls = marker === "단독" ? "dandok"
    : marker === "긴급" ? "urgent" : "sokbo";
  const icons = (a.topics || []).map(t => TOPIC_ICONS[t] || "").join("");
  const badge = a.mention_count > 1
    ? `<span class="badge hot">${a.mention_count}개 언론사</span>` : "";
  const summary = a.summary
    ? `<div class="summary">${escapeHtml(a.summary)}</div>` : "";
  return `<li>
    <a href="${a.link}" target="_blank" rel="noopener">${fresh ? '<span class="live-dot"></span>' : ""}<span class="chip ${cls}">${marker}</span>${escapeHtml(title)}${icons ? `<span class="ticons">${icons}</span>` : ""}</a>
    ${summary}
    <div class="meta">${badge}<span>${timeAgo(a.published)} · ${escapeHtml(a.source || "")}</span></div>
  </li>`;
}

function renderBreaking(data) {
  let html = "";
  if (data.sample) {
    html += `<div class="banner">⚠️ 샘플 데이터입니다. 첫 수집 후 실제 속보로 교체됩니다.</div>`;
  }
  html += `<div class="card">`;
  html += `<h2>🔴 속보 타임라인</h2>`;
  html += `<div class="updated">${fmtTime(data.generated_at)} 업데이트 · 최근 24시간 · 30분마다 자동 수집</div>`;
  if (!data.items || !data.items.length) {
    html += `<div class="empty">최근 24시간 속보가 없습니다.</div>`;
  } else {
    html += `<ul class="articles">`;
    for (const a of data.items) html += breakingLi(a);
    html += `</ul>`;
  }
  html += `</div>`;
  html += `<div class="toolbar">
    <button onclick="copyBreaking()">📋 최근 3시간 속보 복사</button>
  </div>`;
  document.getElementById("content").innerHTML = html;
}

function copyBreaking() {
  const d = breakingData;
  if (!d) return;
  const cut = Date.now() - 3 * 3600 * 1000;
  let items = (d.items || []).filter(i => new Date(i.published).getTime() >= cut);
  if (!items.length) items = (d.items || []).slice(0, 10);
  let lines = [];
  lines.push("━".repeat(14));
  lines.push("🔴 속보 모음");
  lines.push("━".repeat(14));
  lines.push("");
  for (const a of items) {
    lines.push(`❏ (${timeAgo(a.published)}) ${a.title}`);
    lines.push(a.link);
    lines.push("");
  }
  navigator.clipboard.writeText(lines.join("\n")).then(() => {
    alert("속보가 복사되었습니다. 메신저에 붙여넣어 공유하세요!");
  });
}

// 다른 탭 상단에 "최근 30분 속보 n건" 배너 표시
async function updateBanner() {
  const el = document.getElementById("bbanner");
  try {
    if (Date.now() - breakingCache.t > 2 * 60 * 1000 || !breakingCache.data) {
      breakingCache = { t: Date.now(), data: await fetchJson("data/breaking.json") };
    }
    const d = breakingCache.data;
    const recent = d.sample ? [] : (d.items || []).filter(i =>
      Date.now() - new Date(i.published).getTime() < 30 * 60 * 1000);
    if (recent.length) {
      el.textContent = `🔴 최근 30분 속보 ${recent.length}건 — 눌러서 보기`;
      el.classList.add("show");
    } else {
      el.classList.remove("show");
    }
  } catch (e) {
    el.classList.remove("show");
  }
}

function move(offset) {
  const i = dates.indexOf(current) + offset;
  if (i >= 0 && i < dates.length) show(dates[i]);
}

async function show(date) {
  current = date;
  document.getElementById("dateSelect").value = date;
  const i = dates.indexOf(date);
  document.getElementById("prevBtn").disabled = i >= dates.length - 1;
  document.getElementById("nextBtn").disabled = i <= 0;

  try {
    currentData = await fetchBriefing(currentTopic.id, date);
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="empty">데이터를 불러오지 못했습니다.</div>`;
    return;
  }
  render(currentData);
}

function briefingTitle(data) {
  return (data.topic && data.topic.title) || currentTopic.title;
}

// 현재 국내/해외 선택에 따라 보여줄 데이터 조각을 고른다
function currentView(data) {
  if (currentRegion === "intl" && data.intl) {
    return { ...data.intl, isIntl: true };
  }
  return {
    title: briefingTitle(data),
    top_issues: data.top_issues,
    sections: data.sections,
    total_articles: data.total_articles ?? data.total ?? 0,
    isIntl: false,
  };
}

function articleLi(a, rank) {
  const rankHtml = rank ? `<span class="rank">${rank}</span>` : "";
  const badge = a.mention_count > 1
    ? `<span class="badge ${rank ? "hot" : ""}">${a.mention_count}개 언론사</span>`
    : "";
  const extra = (a.sources && a.sources.length > 1)
    ? ` 외 ${a.mention_count - 1}곳` : "";
  const orig = a.title_en
    ? `<div class="meta orig">${escapeHtml(a.title_en)}</div>` : "";
  const summary = a.summary
    ? `<div class="summary">${escapeHtml(a.summary)}</div>` : "";
  return `<li>
    <a href="${a.link}" target="_blank" rel="noopener">${rankHtml}❏ ${escapeHtml(a.title)}</a>
    ${orig}${summary}
    <div class="meta">${badge}<span>${escapeHtml(a.source || "")}${extra}</span></div>
  </li>`;
}

function render(data) {
  updateRegionBar();
  const view = currentView(data);
  let html = "";
  if (data.sample) {
    html += `<div class="banner">⚠️ 샘플 데이터입니다. 다음 정시 수집 때 실제 기사로 교체됩니다.</div>`;
  }
  html += `<div class="card">`;
  html += `<h2>${fmtDate(data.date)} ${escapeHtml(view.title)}</h2>`;
  html += `<div class="updated">${fmtTime(data.generated_at)} 업데이트 · 기사 ${view.total_articles ?? 0}건 수집</div>`;

  if (!view.isIntl && data.weather && data.weather.days && data.weather.days.length) {
    const [t, ...rest] = data.weather.days;
    html += `<div class="weather">`;
    html += `<div class="today">(${dayLabel(t.date)}) ${t.emoji} ${t.min}°C / ${t.max}°C</div>`;
    if (rest.length) {
      html += rest.map(d =>
        `${dayLabel(d.date)}(${d.min}/${d.max})°C ${d.emoji}`).join(" &nbsp; ");
    }
    html += `</div>`;
  }

  const hasTop = view.top_issues && view.top_issues.length;
  const hasSections = view.sections && view.sections.length;

  if (!hasTop && !hasSections) {
    html += `<div class="empty">이 날짜에 수집된 기사가 없습니다.</div>`;
  }

  if (hasTop) {
    html += `<div class="section-title hot">🔥 오늘의 주요 이슈</div>`;
    html += `<ul class="articles">`;
    view.top_issues.forEach((a, i) => { html += articleLi(a, i + 1); });
    html += `</ul>`;
  }

  if (hasSections) {
    for (const sec of view.sections) {
      html += `<div class="section-title">${sec.name} (${sec.articles.length})</div>`;
      html += `<ul class="articles">`;
      for (const a of sec.articles) html += articleLi(a);
      html += `</ul>`;
    }
  }
  html += `</div>`;
  html += `<div class="toolbar">
    <button onclick="copyBriefing()">📋 텍스트로 복사</button>
  </div>`;
  document.getElementById("content").innerHTML = html;
}

// ── 방문자 카운터 ──────────────────────────────────────────────
// Abacus(무료, 가입 불필요) 카운터 API + localStorage로
// "기기당 하루 1회"만 집계한다. 실패하면 조용히 숨긴다.
const COUNTER_API = "https://abacus.jasoncameron.dev";
const COUNTER_NS = "pol112ii-polnews";

async function countValue(action, key) {
  const res = await fetch(`${COUNTER_API}/${action}/${COUNTER_NS}/${key}`);
  if (!res.ok) return 0;
  return (await res.json()).value ?? 0;
}

async function initCounter() {
  const today = new Intl.DateTimeFormat("sv-SE", { timeZone: "Asia/Seoul" })
    .format(new Date()); // YYYY-MM-DD
  const seenKey = "visited-" + today;
  const first = !localStorage.getItem(seenKey);
  // 지난 날짜의 방문 기록은 정리
  Object.keys(localStorage)
    .filter(k => k.startsWith("visited-") && k !== seenKey)
    .forEach(k => localStorage.removeItem(k));
  try {
    const action = first ? "hit" : "get";
    const [t, tot] = await Promise.all([
      countValue(action, "day-" + today),
      countValue(action, "total"),
    ]);
    localStorage.setItem(seenKey, "1");
    document.getElementById("cntToday").textContent = t.toLocaleString();
    document.getElementById("cntTotal").textContent = tot.toLocaleString();
    document.getElementById("counter").hidden = false;
  } catch (e) { /* 카운터 API 장애 시 표시하지 않음 */ }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// 블라인드 글처럼 공유할 수 있는 텍스트 포맷으로 복사
function copyBriefing() {
  const d = currentData;
  if (!d) return;
  const view = currentView(d);
  let lines = [];
  lines.push("━".repeat(14));
  lines.push(`${fmtDate(d.date)} ${view.title}`);
  lines.push("━".repeat(14));
  lines.push("");
  if (!view.isIntl && d.weather && d.weather.days && d.weather.days.length) {
    const [t, ...rest] = d.weather.days;
    lines.push(`(${dayLabel(t.date)}) ${t.emoji} ${t.min}°C / ${t.max}°C`);
    if (rest.length) {
      lines.push(rest.map(x =>
        `${dayLabel(x.date)}(${x.min}/${x.max})°C ${x.emoji}`).join("  "));
    }
    lines.push("");
  }
  if (view.top_issues && view.top_issues.length) {
    lines.push("🔥 오늘의 주요 이슈");
    view.top_issues.forEach((a, i) => {
      lines.push(`${i + 1}. ${a.title} (${a.mention_count}개 언론사)`);
      lines.push(a.link);
      lines.push("");
    });
  }
  for (const sec of view.sections || []) {
    lines.push(`[${sec.name}]`);
    for (const a of sec.articles) {
      lines.push(`❏ ${a.title}`);
      lines.push(a.link);
      lines.push("");
    }
  }
  navigator.clipboard.writeText(lines.join("\n")).then(() => {
    alert("브리핑이 복사되었습니다. 메신저에 붙여넣어 공유하세요!");
  });
}

// ── 첫 방문 사용법 안내 + 홈 화면 설치 가이드 ─────────────────────
let deferredInstall = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstall = e;   // 안드로이드 크롬: '지금 설치' 버튼에 사용
});

function isStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches
    || navigator.standalone === true;
}

function openGuide() {
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);

  const iosBlock = `
    <div class="os ${isIOS ? "mine" : ""}">
      <b class="os-title">🍎 아이폰 (Safari)${isIOS ? '<span class="tag">내 기기</span>' : ""}</b>
      ① 화면 하단 가운데 <b>공유 버튼</b> (네모에서 화살표가 위로 나가는 모양) 누르기<br>
      ② 아래로 내려서 <b>"홈 화면에 추가"</b> 누르기<br>
      ③ 오른쪽 위 <b>추가</b> → 끝! 홈 화면의 📰 아이콘으로 실행
    </div>`;
  const androidBlock = `
    <div class="os ${isAndroid ? "mine" : ""}">
      <b class="os-title">🤖 안드로이드 (Chrome)${isAndroid ? '<span class="tag">내 기기</span>' : ""}</b>
      ① 오른쪽 위 <b>⋮ 메뉴</b> 누르기<br>
      ② <b>"홈 화면에 추가"</b> 또는 <b>"앱 설치"</b> 누르기<br>
      ③ <b>설치</b> → 끝! 홈 화면의 📰 아이콘으로 실행
    </div>`;
  // 내 기기에 맞는 안내를 먼저 보여준다
  const installBlocks = isIOS ? iosBlock + androidBlock
                              : androidBlock + iosBlock;

  const installSection = isStandalone()
    ? `<h3>📲 앱 설치</h3>
       <div class="os mine"><b class="os-title">✅ 이미 앱으로 설치되어 있어요</b>
       지금처럼 홈 화면 아이콘으로 쓰시면 됩니다.</div>`
    : `<h3>📲 앱처럼 쓰기 — 홈 화면에 설치 (10초)</h3>
       ${installBlocks}
       ${deferredInstall ? '<button class="install-now" onclick="installNow()">📲 지금 바로 설치</button>' : ""}`;

  document.getElementById("guideModal").innerHTML = `
    <h2>📰 데일리 뉴스 브리핑 사용법</h2>
    <p class="sub">경찰·부동산·주식 뉴스와 속보를 자동으로 모아드립니다</p>
    <h3>👆 이렇게 쓰세요</h3>
    <ul>
      <li>🔴 <b>속보</b> — 30분마다 갱신되는 실시간 타임라인</li>
      <li>🚔🏠📈 <b>주제 탭</b> — 매시간 갱신, 많이 보도된 뉴스가 🔥 주요 이슈로</li>
      <li>📋 <b>텍스트로 복사</b> — 카톡·단톡방에 그대로 붙여넣어 공유</li>
      <li>📈 주식 탭에는 <b>국내/해외</b> 전환 버튼 (해외는 자동 번역)</li>
    </ul>
    ${installSection}
    <button class="start" onclick="closeGuide()">시작하기</button>
  `;
  document.getElementById("guideBack").classList.add("show");
}

async function installNow() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  await deferredInstall.userChoice;
  deferredInstall = null;
  closeGuide();
}

function closeGuide() {
  document.getElementById("guideBack").classList.remove("show");
  localStorage.setItem("onboarded_v1", "1");
}
document.getElementById("guideBack").addEventListener("click", (e) => {
  if (e.target.id === "guideBack") closeGuide();
});

// 첫 방문자에게 한 번만 자동으로 보여준다
if (!localStorage.getItem("onboarded_v1")) {
  setTimeout(openGuide, 600);
}

// 홈 화면 설치(PWA)를 위한 서비스워커 등록
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

init();
initCounter();
</script>
